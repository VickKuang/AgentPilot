<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoTest Agent - 报告页</title>
  <style>body{font-family:Arial;margin:30px;max-width:1000px} button{padding:8px 12px;margin-right:8px} pre{background:#f6f6f6;padding:10px;white-space:pre-wrap}</style>
</head>
<body>
  <h1>AutoTest Agent - 测试报告页</h1>
  <button onclick="loadReport()">刷新报告</button>
  <button onclick="exportReport('markdown')">导出 Markdown</button>
  <button onclick="exportReport('html')">导出 HTML</button>
  <button onclick="exportReport('pdf')">导出 PDF</button>
  <br/><br/>
  <label>自定义模板（可选，支持 {{task_id}} / {{result}} / {{summary}} / {{issue_summary}} / {{steps}} / {{bug_section}}）</label>
  <br/>
  <textarea id="template" style="width:100%;height:120px" placeholder="# 自定义报告

任务：{{task_id}}
结论：{{result}}
{{steps}}"></textarea>
  <pre id="report"></pre>
  <pre id="bug"></pre>
  <pre id="export"></pre>

  <script>
    const taskId = new URLSearchParams(location.search).get('task_id');
    async function loadReport() {
      const [rep, bug] = await Promise.all([
        fetch(`/api/v1/tasks/${taskId}/report`),
        fetch(`/api/v1/tasks/${taskId}/bug-report`)
      ]);
      document.getElementById('report').textContent = JSON.stringify(await rep.json(), null, 2);
      document.getElementById('bug').textContent = JSON.stringify(await bug.json(), null, 2);
    }

    async function exportReport(format) {
      const template = document.getElementById('template').value.trim();
      const query = new URLSearchParams({ format });
      if (template) query.set('template', template);

      const res = await fetch(`/api/v1/tasks/${taskId}/report/export?${query.toString()}`);
      if (format === 'pdf') {
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
        document.getElementById('export').textContent = 'PDF 已在新标签页打开';
        return;
      }
      document.getElementById('export').textContent = await res.text();
    }

    loadReport();
  </script>
</body>
</html>
